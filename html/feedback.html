<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback - AP Spend.ly</title>
    <link rel="stylesheet" href="../css/feedback.css" />
  </head>
  <body>
    <header class="header">
      <div class="company-info">
        <h1>AP Spend.ly</h1>
        <p>Take control of your financial journey</p>
      </div>
      <nav class="navbar">
        <ul>
          <li><a href="dashboard.html">Home</a></li>
          <li><a href="income.html">Income</a></li>
          <li><a href="expense.html">Expense</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="support.html">Support</a></li>
          <li><a href="feedback.html">Feedback</a></li>
        </ul>
      </nav>
    </header>

    <main class="main-content">
      <section class="feedback-section">
        <h2>We Value Your Feedback</h2>
        <p>
          Please share your thoughts, suggestions, or any issues you have
          encountered. Your feedback helps us improve.
        </p>

        <form class="feedback-form" action="submit_feedback.php" method="POST">
          <div class="form-group">
            <label for="name">Your Name:</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter your name"
              required
            />
          </div>
          <div class="form-group">
            <label for="email">Your Email:</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
            />
          </div>
          <div class="form-group">
            <label for="feedback">Your Feedback:</label>
            <textarea
              id="feedback"
              name="feedback"
              rows="5"
              placeholder="Enter your feedback"
              required
            ></textarea>
          </div>
          <button type="submit">Submit Feedback</button>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2024 AP Spend.ly. All rights reserved.</p>
    </footer>
  </body>
</html>
